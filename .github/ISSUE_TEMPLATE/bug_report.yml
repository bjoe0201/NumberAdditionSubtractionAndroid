name: Bug report
description: Report a reproducible problem
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail so we can reproduce it.

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Briefly describe the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app
        2. Go to ...
        3. Tap ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: e.g. v1.0.0

  - type: input
    id: device
    attributes:
      label: Device / Android version
      placeholder: e.g. Pixel 8 / Android 14

