name: Feature request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the use case clearly.

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Briefly describe your feature request
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      placeholder: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Optional

